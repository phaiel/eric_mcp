# Dependabot keeps dependencies up to date so we don't have to wait for the
# next CVE to remember which packages we depend on. Grouping related updates
# means one PR per ecosystem per week instead of dozens.
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      nestjs:
        patterns:
          - "@nestjs/*"
      prisma:
        patterns:
          - "prisma"
          - "@prisma/*"
      next:
        patterns:
          - "next"
          - "@next/*"
          - "react"
          - "react-dom"
      eslint-prettier:
        patterns:
          - "eslint*"
          - "@typescript-eslint/*"
          - "prettier"
      types:
        patterns:
          - "@types/*"
      jest:
        patterns:
          - "jest"
          - "ts-jest"
          - "@types/jest"
    ignore:
      # Major upgrades require manual review (often include breaking API changes).
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Etc/UTC
    labels:
      - dependencies
      - github-actions

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Etc/UTC
    labels:
      - dependencies
      - docker
