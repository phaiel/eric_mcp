name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the information below to help us investigate.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: dropdown
    id: connector
    attributes:
      label: Connector Type
      description: Which connector is affected (if applicable)?
      options:
        - REST
        - SOAP
        - GraphQL
        - Database
        - MCP Bridge
        - Not applicable
    validations:
      required: false

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment Method
      description: How is AnythingMCP deployed?
      options:
        - Docker Compose
        - Railway
        - Manual (without Docker)
        - Local development
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: AnythingMCP version or commit hash
      placeholder: e.g., v0.1.0 or abc1234
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant log output (backend logs, browser console, etc.)
      render: shell
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node.js version, Docker version, browser, etc.
      placeholder: |
        - OS: macOS 15 / Ubuntu 24.04 / Windows 11
        - Node.js: 22.x
        - Docker: 27.x
        - Browser: Chrome 131
    validations:
      required: false
